{% extends "frappe/templates/base.html" %}

{% block head %}
{{ super() }}

<!-- PWA Meta Tags -->
<meta name="theme-color" content="#FFF9F0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gris">
<meta name="application-name" content="Gris">
<meta name="msapplication-TileColor" content="#FFF9F0">
<meta name="msapplication-tap-highlight" content="no">

<!-- PWA Manifest -->
<link rel="manifest" href="/assets/gris/manifest.json">

<!-- iOS Icons (apple-touch-icon) -->
<link rel="apple-touch-icon" sizes="180x180" href="/assets/gris/images/icons/ios/180.png">
<link rel="apple-touch-icon" sizes="167x167" href="/assets/gris/images/icons/ios/167.png">
<link rel="apple-touch-icon" sizes="152x152" href="/assets/gris/images/icons/ios/152.png">
<link rel="apple-touch-icon" sizes="120x120" href="/assets/gris/images/icons/ios/120.png">

<!-- Android/Chrome Icons -->
<link rel="icon" type="image/png" sizes="192x192" href="/assets/gris/images/icons/android/android-launchericon-192-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/assets/gris/images/icons/android/android-launchericon-512-512.png">
<link rel="icon" type="image/png" sizes="96x96" href="/assets/gris/images/icons/android/android-launchericon-96-96.png">
{% endblock %}
