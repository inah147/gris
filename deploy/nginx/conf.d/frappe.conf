upstream frappe-server {
    server frappe:8000 fail_timeout=0;
}

upstream socketio-server {
    server frappe:9000 fail_timeout=0;
}

# Redirect HTTP to HTTPS (uncomment for production with SSL)
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    server_name localhost;

    # Root directory for static files
    root /workspace/frappe-bench/sites;

    # Logs
    access_log /var/log/nginx/gris-access.log;
    error_log /var/log/nginx/gris-error.log;

    # Performance tweaks
    client_max_body_size 50m;
    client_body_buffer_size 16K;
    client_header_buffer_size 1k;

    # Proxy settings
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Socket.io location
    location /socket.io {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://socketio-server;
    }

    # Static assets location
    location /assets {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /files {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Frappe application
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_read_timeout 120s;
        proxy_redirect off;

        proxy_pass http://frappe-server;
    }

    # Health check endpoint
    location /api/method/ping {
        proxy_pass http://frappe-server;
        proxy_set_header Host $host;
        access_log off;
    }
}
