<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRIS Skill Review</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    pre { white-space: pre-wrap; }
    textarea { width: 100%; min-height: 90px; }
    .toolbar { display: flex; gap: 8px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Review: <span id="skill-name"></span></h1>
  <div id="progress"></div>
  <div class="card">
    <h3>Prompt</h3>
    <pre id="prompt"></pre>
  </div>
  <div class="card">
    <h3>Outputs</h3>
    <div id="outputs"></div>
  </div>
  <div class="card">
    <h3>Feedback</h3>
    <textarea id="feedback" placeholder="Seu feedback para esta execução..."></textarea>
  </div>
  <div class="toolbar">
    <button onclick="prevRun()">Anterior</button>
    <button onclick="nextRun()">Próximo</button>
    <button onclick="downloadFeedback()">Baixar feedback.json</button>
  </div>

  <script>
    /*__EMBEDDED_DATA__*/
    let idx = 0;
    const feedback = {};

    function render() {
      const run = EMBEDDED_DATA.runs[idx];
      document.getElementById('skill-name').textContent = EMBEDDED_DATA.skill_name;
      document.getElementById('progress').textContent = `${idx + 1} de ${EMBEDDED_DATA.runs.length}`;
      document.getElementById('prompt').textContent = run.prompt || '(sem prompt)';
      document.getElementById('feedback').value = feedback[run.id] || '';

      const out = document.getElementById('outputs');
      out.innerHTML = '';
      if (!run.outputs || run.outputs.length === 0) {
        out.innerHTML = '<em>Sem arquivos de saída.</em>';
      } else {
        run.outputs.forEach(f => {
          const div = document.createElement('div');
          div.className = 'card';
          if (f.type === 'text') {
            div.innerHTML = `<strong>${f.name}</strong><pre>${escapeHtml(f.content || '')}</pre>`;
          } else {
            div.innerHTML = `<strong>${f.name}</strong><p>Arquivo não textual (download no workspace).</p>`;
          }
          out.appendChild(div);
        });
      }
    }

    function escapeHtml(s) {
      return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
    }

    function saveCurrent() {
      const run = EMBEDDED_DATA.runs[idx];
      feedback[run.id] = document.getElementById('feedback').value;
    }

    function prevRun() { saveCurrent(); if (idx > 0) idx--; render(); }
    function nextRun() { saveCurrent(); if (idx < EMBEDDED_DATA.runs.length - 1) idx++; render(); }

    function downloadFeedback() {
      saveCurrent();
      const reviews = EMBEDDED_DATA.runs.map(r => ({
        run_id: r.id,
        feedback: feedback[r.id] || '',
        timestamp: new Date().toISOString()
      }));
      const payload = { reviews, status: 'complete' };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'feedback.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    render();
  </script>
</body>
</html>
